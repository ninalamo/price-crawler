name: Daily Price Crawl

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      stores:
        description: 'Stores (comma-separated: sm,shopwise,robinsons,metromart,super8)'
        default: 'sm,shopwise,robinsons,metromart,super8'
        type: string

jobs:
  setup:
    runs-on: self-hosted
    timeout-minutes: 5
    outputs:
      stores: ${{ steps.set-stores.outputs.stores }}
    steps:
      - id: set-stores
        run: |
          $stores = "${{ github.event.inputs.stores || 'sm,shopwise,robinsons,metromart,super8' }}"
          $json = ($stores -split ',' | ForEach-Object { """$_""" }) -join ','
          Add-Content -Path $env:GITHUB_OUTPUT -Value "stores=[$json]"

  crawl:
    needs: setup
    strategy:
      matrix:
        store: ${{ fromJSON(needs.setup.outputs.stores) }}
      fail-fast: false

    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run crawl (${{ matrix.store }})
        run: npm run crawl -- --stores ${{ matrix.store }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_URL: ${{ secrets.API_URL }}
